apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mylibrary
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/M-Dutra/mylibrary.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: my-library-cluster-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
